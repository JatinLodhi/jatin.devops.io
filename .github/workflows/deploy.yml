name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub UI

  
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # ── Job 1: Validate ──────────────────────────────────────
  validate:
    name: Validate HTML & Assets
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking project structure..."
          
          files=(
            "index.html"
            "assets/css/style.css"
            "assets/js/main.js"
          )
          
          all_ok=true
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — NOT FOUND"
              all_ok=false
            fi
          done
          
          if [ "$all_ok" = false ]; then
            echo ""
            echo "ERROR: One or more required files are missing."
            exit 1
          fi
          
          echo ""
          echo "All required files present."

      - name: Check index.html is not empty
        run: |
          size=$(wc -c < index.html)
          echo "index.html size: ${size} bytes"
          if [ "$size" -lt 500 ]; then
            echo "ERROR: index.html looks too small — possible corruption."
            exit 1
          fi
          echo "index.html size check passed."

      - name: Check for placeholder contact links
        run: |
          echo "Checking for unfilled placeholder links..."
          if grep -q "devops.engineer@email.com" index.html; then
            echo "⚠️  WARNING: Placeholder email found. Update it before publishing."
          fi
          if grep -q "linkedin.com/in/devops-engineer" index.html; then
            echo "⚠️  WARNING: Placeholder LinkedIn URL found. Update it before publishing."
          fi
          if grep -q "github.com/devops-engineer\"" index.html; then
            echo "⚠️  WARNING: Placeholder GitHub URL found. Update it before publishing."
          fi
          echo "Placeholder check complete."


  # ── Job 2: Build ─────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: validate
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Display site info
        run: |
          echo "========================================"
          echo "  DevOps Portfolio — Build Info"
          echo "========================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "========================================"
          echo ""
          echo "Files to be deployed:"
          find . -not -path './.git/*' -not -path './.github/*' -type f | sort
          echo ""
          echo "Total size:"
          du -sh . --exclude='.git' --exclude='.github'

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # deploy from repo root (where index.html lives)


  # ── Job 3: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: |
          echo ""
          echo "========================================"
          echo "  Deployment complete!"
          echo "  Live URL: ${{ steps.deployment.outputs.page_url }}"
          echo "========================================"
